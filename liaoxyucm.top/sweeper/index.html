<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minesweeper | LiaoxyuCM</title>
	<link rel="shortcut icon" href="https://assets.liaoxyucm.top/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
            padding: 20px;
        }

        .game-container {
            text-align: center;
			display: flex;
			flex-direction: column;
        }

		.settings-container, .hint-container {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			border: 1px solid #000;
			border-radius: 5px;
			width: 350px;
			background-color: #fff;
			flex-direction: column;
			padding: 5px;
			z-index: 101;
		}

		.settings-container {
			display: none;
		}

		.coverboard {
			width: 100%;
			height: 100%;
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background-color: rgba(0, 0, 0, .6);
			display: none;
			z-index: 100;
		}

		.settings-container .cancel {
			text-align: left;
			color: #777;
			width: 50px;
		}

		.settings-container .cancel:hover {
			cursor: pointer;
		}

        .status {
            margin: 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .boardstyle {
            display: inline-grid;
            grid-template-columns: repeat(10, 30px);
            gap: 2px;
            background: #ccc;
            padding: 5px;
            border: 3px solid #999;
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #fff;
            border: 2px solid #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
			transition: .3s background-color ease-in-out;
        }

		#board .cell:not(.revealed) {
            cursor: pointer;
		}

		#testb .cell:nth-child(1) {
			border-top-left-radius: 8px !important;
			border-bottom-left-radius: 8px !important;
		}
		#testb .cell:nth-child(10) {
			border-top-right-radius: 8px !important;
			border-bottom-right-radius: 8px !important;
		}

		#board .cell:nth-child(1) {
			border-top-left-radius: 8px !important;
		}
		#board .cell:nth-child(10) {
			border-top-right-radius: 8px !important;
		}
		#board .cell:nth-child(91) {
			border-bottom-left-radius: 8px !important;
		}
		#board .cell:nth-child(100) {
			border-bottom-right-radius: 8px !important;
		}

        .cell.revealed {
            border: 1px solid #999;
            background: #eee;
        }

        .cell.mine {
            background: #ff4444;
        }

        .cell.flagged {
            color: red;
        }

        .button {
            margin-top: 15px;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background: #28b6af;
			border: 2px solid #26a39d;
            color: white;
            border-radius: 4px;
			transition: .15s background ease-in-out;
			width: 100%;
        }

        .button:hover {
            background: #26a39d;
        }

		.flex-row {
			display: flex;
			flex-direction: row;
		}

		.minesset {
			width: 270px;
		}

		.schemeset {
			width: 50px;
		}
    </style>
</head>
<body>
    <div class="game-container">
        <div class="status" id="status">💣 10</div>
        <div class="boardstyle" id="testb">
			<div class="cell revealed" data-row="0" data-col="0"></div>
			<div class="cell revealed" data-row="1" data-col="0" style="color: #005ec9">1</div>
			<div class="cell revealed" data-row="2" data-col="0" style="color: #00c996">2</div>
			<div class="cell revealed" data-row="3" data-col="0" style="color: #CAC531">3</div>
			<div class="cell revealed" data-row="4" data-col="0" style="color: #f58e19">4</div>
			<div class="cell revealed" data-row="5" data-col="0" style="color: #f12711">5</div>
			<div class="cell revealed" data-row="6" data-col="0" style="color: #c471ed">6</div>
			<div class="cell revealed" data-row="7" data-col="0" style="color: #8E2DE2">7</div>
			<div class="cell revealed" data-row="8" data-col="0" style="color: #4A00E0">8</div>
			<div class="cell" data-row="9" data-col="0"></div>
		</div>
		<br>
        <div id="board" class="boardstyle"></div>
        <button id="reset" class="button">重新开始</button>
		<button class="button showsettings" onclick="showSettings()">设置</button>
    
		<br>
		<div class="coverboard"></div>
		<div class="settings-container">
			<p class="cancel" onclick="hideSettings()">返回</p>
			<p><strong>注意</strong>：提交设置后，游戏进度将会被丢失</p>
			<hr>
			<div class="flex-row">
				<p>颜色方案：</p>
				<select name="scheme" class="schemeset">
					<option value="modern">现代</option>
					<option value="classic">经典</option>
					<option value="grey">黑白</option>
				</select>
			</div>
			<div class="flex-row">
				<p>雷数：</p>
				<input name="mines" class="minesset" type="range" min="0" max="99" value="10" step="1" />
				<p class="show_mines" style="font-family:monospace;"></p>
			</div>

			<input type="submit" class="button" onclick="submit()" value="提交">
		</div>

		<noscript>
			<div class="coverboard" style="display: flex"></div>
			<div class="hint-container">
				<h3>请启用JavaScript</h3>
				<p>该游戏依赖JavaScript运行</p>
			</div>
		</noscript>
	</div>
	<script>
		const params = new URLSearchParams(window.location.search);
		const minesParam = params.get("mines")

		
		function hideSettings() {
			document.querySelector(".showsettings").style.display = "inline-block";
			document.querySelector(".settings-container").style.display = "none";
			document.querySelector(".coverboard").style.display = "none";
		}


		const minesSet = document.querySelector('.minesset');
		const schemeSet = document.querySelector('.schemeset');
		const minesSpan = document.querySelector('.show_mines');

		// 实时更新显示
        const colors = {
			"classic": ['blue', 'green', 'red', 'darkblue', 'brown', 'cyan', 'black', 'gray'],
			"modern": ['#005ec9', '#00c996', '#CAC531', '#f58e19', '#f12711', '#c471ed', '#8E2DE2', '#4A00E0'],
			"grey": ['#888', '#777', '#666', '#555', '#444', '#333', '#222', '#111', '#000']
		}
		let colorScheme = "modern";
		let MINES = 10
		minesSet.addEventListener("input", () => {
			minesSpan.textContent = minesSet.value;
		})

		function submit() {
			MINES = parseInt(minesSet.value)
			colorScheme = schemeSet.value
			hideSettings();
			initGame();
			revealColor();
		}

		///////////////////////////////////////////////////////



		const ROWS = 10;
        const COLS = 10;


        let board = [];
        let gameOver = false;
        let flags = 0;
        let revealed = 0;
        let isFirstClick = true; // 标记第一次点击

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetButton = document.getElementById('reset')

		function showSettings() {
			minesSet.value = MINES;
			schemeSet.value = colorScheme;
			minesSpan.textContent = minesSet.value;
			document.querySelector(".showsettings").style.display = "none";
			document.querySelector(".coverboard").style.display = "flex";
			document.querySelector(".settings-container").style.display = "flex";
		}

		function revealColor() {
			document.querySelectorAll("#testb .cell.revealed").forEach(cell => {
				if (cell.textContent) {
					cell.style.color = colors[colorScheme][parseInt(cell.textContent.trim()) - 1]
				}
			})
		}

		revealColor()


        // 移动端长按
        let longPressTimer = null;
        const LONG_PRESS_TIME = 250;
        function initGame() {
			function startLongPress(r, c) {
				longPressTimer = setTimeout(() => {
					flagCell(r, c);
					longPressTimer = null;
				}, LONG_PRESS_TIME);
			}

			function cancelLongPress(r, c, j=true) {
				if (longPressTimer !== null) {
					clearTimeout(longPressTimer);
					if (j) {revealCell(r, c)};
					longPressTimer = null;
				} 

			}

			// 初始化只创建空棋盘，不埋雷
			board = [];
			gameOver = false;
			flags = 0;
			revealed = 0;
			isFirstClick = true; // 标记第一次点击
            boardElement.innerHTML = '';
            statusElement.textContent = `💣 ${MINES}`;

            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = { mine: false, revealed: false, flagged: false, count: 0 };
                }
            }

            // 渲染格子
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    cell.addEventListener('click', () => revealCell(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        flagCell(r, c);
                    });

                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        startLongPress(r, c);
                    });
                    cell.addEventListener('touchend', () => {cancelLongPress(r, c)});
                    cell.addEventListener('touchmove', () => {cancelLongPress(r, c, false)});

                    boardElement.appendChild(cell);
                }
            }
        }

        // 第一次点击后才埋雷，避开当前格子
        function generateMines(firstR, firstC) {
            let minesPlaced = 0;
            while (minesPlaced < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);

                // 避开第一次点击的格子
                if (r === firstR && c === firstC) continue;
                if (!board[r][c].mine) {
                    board[r][c].mine = true;
                    minesPlaced++;
                }
            }

            // 计算数字
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].mine) {
                        let count = 0;
                        for (let i = -1; i <= 1; i++) {
                            for (let j = -1; j <= 1; j++) {
                                if (i === 0 && j === 0) continue;
                                const nr = r + i;
                                const nc = c + j;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].mine) count++;
                            }
                        }
                        board[r][c].count = count;
                    }
                }
            }
        }

        // 翻开格子
        function revealCell(r, c) {
            if (gameOver || board[r][c].revealed || board[r][c].flagged) return;

            // 第一次点击：先生成雷，保证不是雷
            if (isFirstClick) {
                generateMines(r, c);
                isFirstClick = false;
            }

            if (board[r][c].mine) {
                gameOver = true;
				document.querySelectorAll("#board .cell.revealed").forEach(c => {
					c.style.backgroundColor = "#FFC371";
				});
                showAllMines();
                document.querySelector(`#board [data-row="${r}"][data-col="${c}"]`).textContent = '💥';
                return;
            }

            board[r][c].revealed = true;
            revealed++;
            updateCell(r, c);

            if (board[r][c].count === 0) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        if (i === 0 && j === 0) continue;
                        const nr = r + i;
                        const nc = c + j;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) revealCell(nr, nc);
                    }
                }
            }

            if (revealed === ROWS * COLS - MINES) {
                gameOver = true;
				document.querySelectorAll("#board .cell.revealed").forEach(c => {
					c.style.backgroundColor = "#d4fc79";
				});
                statusElement.textContent = '💣 0';
            }
        }

        // 插旗
        function flagCell(r, c) {
            if (gameOver || board[r][c].revealed) return;
            board[r][c].flagged = !board[r][c].flagged;
            flags += board[r][c].flagged ? 1 : -1;
            statusElement.textContent = `💣 ${MINES - flags}`;
            updateCell(r, c);
        }

		function updateAllFlags() {
			const cells = document.querySelectorAll("#board .cell.flagged");
			cells.forEach(cell => {
				if (!cell.classList.contains("mine")) {
					cell.textContent = '❌';
				}
			})
		}

        // 更新显示
        function updateCell(r, c) {
            const cell = document.querySelector(`#board [data-row="${r}"][data-col="${c}"]`);
            cell.classList.remove('revealed', 'flagged', 'mine');

            if (board[r][c].revealed) {
                cell.classList.add('revealed');
                if (board[r][c].mine) {
                    cell.classList.add('mine');
                    if ((cell.textContent != '💥') && (cell.textContent != '🚩')) {
                    	cell.textContent = '💣'
					};
                } else if (board[r][c].count > 0) {
                    cell.textContent = board[r][c].count;
                    cell.style.color = colors[colorScheme][board[r][c].count - 1];
                }
            } else if (board[r][c].flagged) {
                cell.classList.add('flagged');
                cell.textContent = '🚩';
            } else {
                cell.textContent = '';
            }
        }

        // 游戏结束展示所有雷
        function showAllMines() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c].mine) {
                        board[r][c].revealed = true;
                        updateCell(r, c);
                    }
                }
            }
			updateAllFlags();
        }

        resetButton.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
